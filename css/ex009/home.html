<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        header{
            background-color: orange;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            height: 70px;
            align-items: center;
        }
        nav{
            background-color: orange;
            width: 390px;
        }
        ul{
            display: flex;
            list-style-type: none;
            justify-content: space-around;
        }
        section{
            background-color: yellow;
            height: 270px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #card{
            background-color: red;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center ;
            align-items: center;
            color: white;
        }
    </style>
</head>
<body>
    
   <header>
      <div>
        LOGO
      </div>
      <nav>
        <ul>
           <li><a href="https://www.instagram.com/">Home</a></li>
           <li>Produtos</li>
           <li>Contatos</li>
           <li>Sobre</li>
        </ul>
    </nav>
   </header>

   <section>
        <div id="card">
            Noticias
        </div>
   </section>


  
</body>
</html>
