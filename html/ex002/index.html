<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    
     <h1> Trabalhando com listas</h1>

     <h2>Listas não ordenadas - compra de materias escolares</h2>

     <ul type="">  <!--Type para mudar o tipo do item (Formas como o quadrado)-->
        <li>Caderno</li> 
        <li>Caneta</li>
        <li>Borracha</li>
        <li>Mochila</li>
 

     </ul>

    <h2>Listas Ordenadas</h2>
       <ol type="" start=""> <!--Type para mudar o tipo do item (Letras, etc..)-->
                             <!--Start para colocar de onde quer começar a lista ex: 5.-->
           <li> Esquentar a água</li>
           <li> Adoçar a água </li>
           <li> Colocar o pó de café no filtro</li>
           <li> Coar o café com a água quente </li>
           <li> Servir o café</li>
       </ol>
</body>
</html>
