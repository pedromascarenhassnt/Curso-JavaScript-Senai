<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
</head>
<body>
      


    <script>
      let nomeAluno = window.prompt("Digite seu nome:")
      let nota1 = Number(window.prompt("Digite sua primeira nota"))
      let nota2 = Number(window.prompt("Digite sua segundo nota"))
      let nota3 = Number(window.prompt("Digite sua terceira nota"))

      let media = (nota1 + nota2 + nota3) / 3
      window.alert(`A média do aluno ${nomeAluno} foi: ${media.toFixed(1)}`)
    </script>
</body>
</html>
